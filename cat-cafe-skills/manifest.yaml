# Clowder AI Skills Manifest — 路由单一真相源
# 所有 skill 的触发规则、排除条件、产出契约、skill-to-skill next 链在此定义。
# SOP stage / suggested skill / hard rules / pitfalls 的机器真相源是 sop-definitions/development.yaml。
# CLAUDE.md / AGENTS.md / GEMINI.md 的路由表当前手工同步（Wave 2 计划自动生成）。
# lint 规则：pnpm check:skills（Wave 2 计划增强为 manifest 一致性校验）
#
# 更新日期：2026-05-23
# 来源决策：F042 三层信息架构

# ─── 开发流程链 ─────────────────────────────────────────
# feat-lifecycle → Design Gate(设计确认) → writing-plans → worktree → tdd
#     → quality-gate → request-review → receive-review
#     → merge-gate → feat-lifecycle(完成)

skills:

  # ── 功能生命周期 ──
  feat-lifecycle:
    category: "开发流程"
    description: >
      Feature 立项、讨论、完成的全生命周期管理。
      Use when: 开个新功能、new feature、F0xx、立项、feature 完成、验收通过、讨论新功能需求。
      Not for: 代码实现、review、merge（那些有专门的 skill）。
      Output: Feature 聚合文件 + BACKLOG 索引 + 真相源同步。
    triggers:
      - "开个新功能"
      - "new feature"
      - "F0xx"
      - "立项"
      - "feature 完成"
      - "F0xx done"
      - "验收通过"
      - "讨论新功能需求"
    not_for:
      - "写代码"
      - "review"
      - "merge"
    output: "Feature aggregate file / truth-source sync"
    next: ["writing-plans"]
    sop_step: null
    merged_from: ["feat-kickoff", "feat-discussion", "feat-completion"]

  # ── 引导流程设计 ──
  guide-authoring:
    category: "引导与协作"
    description: >
      标准引导流程设计 SOP：场景识别 → YAML 编排 → 标签标注 → 注册发现 → 测试验证。
      Use when: 新建引导流程、添加场景引导、维护 Guide Catalog、编写引导 YAML。
      Not for: 使用引导（用户侧）、Guide Engine 代码实现（用 tdd）、视觉设计（用 pencil-design）。
      Output: Flow YAML + tag-manifest 更新 + registry 注册 + CI 校验通过。
    triggers:
      - "新建引导"
      - "添加场景引导"
      - "写引导流程"
      - "guide authoring"
      - "引导 YAML"
    not_for:
      - "使用引导"
      - "Guide Engine 实现"
      - "出设计稿"
    output: "Flow YAML / tag-manifest / registry entry / CI green"
    next: ["pencil-design", "tdd"]
    sop_step: null

  guide-interaction:
    category: "引导与协作"
    description: >
      场景引导交互模式：用户明确在问某项功能怎么做时，先判断该直接解释还是进入交互引导；
      系统注入了 Guide Matched / Guide Pending / Guide Selection / Guide Active / Guide Completed 时，
      按状态驱动回复并使用对应 guide MCP 工具。
      Use when: 系统注入了上述 guide 状态，或用户明确在问某项功能怎么操作。
      Not for: 普通闲聊、代码实现、没有流程诉求的概念讨论。
      Output: guide 目录判断 + 交互选择卡片 + 状态持久化 + 前端引导启动。
    triggers:
      - "引导流程"
      - "怎么配置"
      - "怎么操作"
    not_for:
      - "普通闲聊"
      - "代码实现"
    output: "Guide catalog judgment / choice card / state persistence / overlay start"
    next: ["guide-authoring"]
    sop_step: null

  # ── 协作思考 ──
  collaborative-thinking:
    category: "引导与协作"
    description: >
      单人或多猫的创意探索、独立思考、讨论收敛。
      Use when: brainstorm、多猫独立思考、讨论结束需要收敛、方向性问题需要多视角。
      Not for: 已有明确 spec 直接写代码、单猫执行已定方案。
      Output: 收敛报告（共识/分歧/行动项）+ 三件套沉淀检查。
    triggers:
      - "brainstorm"
      - "讨论"
      - "多猫独立思考"
      - "收敛"
      - "讨论结束"
      - "总结一下"
    not_for:
      - "已有 spec 直接写代码"
      - "单人执行"
    output: "Convergence report + settlement checklist"
    next: ["writing-plans", "feat-lifecycle"]
    sop_step: null
    merged_from: ["brainstorming", "multi-cat-brainstorm", "discussion-convergence"]

  # ── 专家辩论团 ──
  expert-panel:
    category: "引导与协作"
    description: >
      多猫专家辩论团：独立分析→挑战→收敛→风险预演→语音汇报→文档交付。
      Use when: 技术趋势判断、竞品分析、行业事件分析、需要多视角决策支持、operator说"帮我分析一下"。
      Not for: 单猫能搞定的问题、代码实现、bug fix、日常聊天。
      Output: 洞察卡片(rich block) + 语音总结 + 会议纪要 + 正式报告(DOCX/PDF)。
    triggers:
      - "帮我分析一下"
      - "专家辩论"
      - "expert panel"
      - "技术参谋"
      - "竞品分析"
      - "行业分析"
      - "趋势判断"
      - "多猫分析"
      - "三猫讨论"
      - "showcase"
    not_for:
      - "单猫能搞定的问题"
      - "代码实现"
      - "bug fix"
      - "日常聊天"
    output: "Insight card + voice summary + meeting notes + formal report (DOCX/PDF)"
    next: ["feat-lifecycle", "deep-research", "collaborative-thinking"]
    sop_step: null
    merged_from: null

  # ── 计划编写 ──
  writing-plans:
    category: "开发流程"
    description: >
      将 spec/需求拆分为可执行的分步实施计划。
      Use when: 有 spec 或需求，准备动手前需要拆分步骤。
      Not for: trivial 改动（≤5 行）、已有详细计划。
      Output: 分步实施计划（含 TDD 步骤和检查点）。
    triggers:
      - "写计划"
      - "implementation plan"
      - "拆分步骤"
    not_for:
      - "trivial 改动"
      - "已有计划"
    output: "Phased implementation plan"
    next: ["worktree"]
    sop_step: null
    merged_from: null

  # ── Worktree 隔离 ──
  worktree:
    category: "开发流程"
    description: >
      创建 Git worktree 隔离开发环境，含 Redis 6398 安全配置。
      Use when: 开始任何代码修改、新功能开发、bug fix。
      Not for: 纯文档修改（≤5 行）、不涉及代码的讨论。
      Output: 隔离的 worktree + 正确的 Redis/环境配置。
    triggers:
      - "开始开发"
      - "新 worktree"
      - "开 worktree"
    not_for:
      - "纯文档 ≤5 行"
      - "不涉及代码"
    output: "Isolated worktree with Redis 6398"
    next: ["tdd"]
    sop_step: 1
    merged_from: ["using-git-worktrees"]

  # ── TDD ──
  tdd:
    category: "开发流程"
    description: >
      Red-Green-Refactor 测试驱动开发纪律。
      Use when: 写新功能代码、修 bug、任何实现工作。
      Not for: 纯文档、纯调研、已有充分测试的 trivial 改动。
      Output: 失败测试 → 最小实现 → 重构，全程有测试保护。
    triggers:
      - "写代码"
      - "test first"
      - "TDD"
      - "红绿重构"
    not_for:
      - "纯文档"
      - "调研"
    output: "Tests + implementation (red-green-refactor)"
    next: ["quality-gate"]
    sop_step: 1
    merged_from: ["test-driven-development"]

  # ── 调试 ──
  debugging:
    category: "开发流程"
    description: >
      系统化 bug 定位：根因调查 → 模式分析 → 假设验证 → 修复。
      Use when: 遇到 bug、测试失败、unexpected behavior。
      Not for: 新功能开发、重构、已知原因的简单修复。
      Output: Bug report（5件套）+ 根因 + 修复（含回归测试）。
    triggers:
      - "bug"
      - "报错"
      - "test failure"
      - "unexpected behavior"
    not_for:
      - "新功能"
      - "重构"
    output: "Bug report + root cause + fix"
    next: ["quality-gate"]
    sop_step: null
    merged_from: ["systematic-debugging"]

  # ── Code as Harness（用代码修自己 / 建新能力） ──
  code-as-harness:
    category: "治理"
    description: >
      检测摩擦信号 → 搜证据确认重复 → 诊断根因 → 用代码修已有 harness 或沉淀新 harness。
      Fix（确认重复→hook/lint/guard）+ Build（反复出现的新任务→规划新 skill）。
      Use when: operator不满且搜证据确认历史上重复出现、连续 cancel、反复出现的陌生任务类型。
      Not for: 一次性批评（搜证据未发现重复）、玩笑式笨猫、首次代码 bug（用 debugging）、
      review 反馈（用 receive-review）、一次性新任务（直接做不建 harness）。
      Output: Rich block 诊断卡 + 可选 F128 新 thread 提议 + 根因分类。
      GOTCHA: 必须先搜证据确认重复才弹卡。"又"是高频词不能字面匹配。一次性新任务先做再沉淀。
    triggers:
      - "又忘了"
      - "多少次了"
      - "每次都"
      - "怎么还"
      - "总是忘"
      - "又失忆"
      - "反复出现的新任务"
    not_for:
      - "一次性批评"
      - "笨猫哈哈"
      - "首次代码 bug"
      - "review 反馈"
      - "一次性新任务"
    output: "Rich block 诊断卡 / F128 thread 提议 / 根因分类"
    next: ["debugging", "deep-research", "writing-skills", "self-evolution"]
    sop_step: null

  # ── 质量门禁 ──
  quality-gate:
    category: "开发流程"
    description: >
      开发完成后的自检门禁：愿景对照 + spec 合规 + 验证。
      Use when: 开发完了准备提 review、声称完成了、准备交付。
      Not for: 收到 review 反馈（用 receive-review）、merge（用 merge-gate）。
      Output: Spec 合规报告（含愿景覆盖度）。
    triggers:
      - "开发完了"
      - "准备 review"
      - "自检"
      - "声称完成"
    not_for:
      - "收到 review 反馈"
      - "merge"
    output: "Spec compliance report + vision alignment"
    next: ["request-review"]
    sop_step: 2
    merged_from: ["spec-compliance-check", "verification-before-completion"]

  # ── 请求 Review ──
  request-review:
    category: "开发流程"
    description: >
      向跨家族 peer-reviewer 发送 review 请求（含五件套）。
      Use when: 自检通过后准备请其他猫 review。
      Not for: 收到 review 结果（用 receive-review）、自检（用 quality-gate）。
      Output: Review 请求信（存档到 review-notes/）。
    triggers:
      - "请 review"
      - "帮我看看"
      - "request review"
    not_for:
      - "收到 review"
      - "自检"
    output: "Review request letter in review-notes/"
    next: ["receive-review"]
    sop_step: 3
    merged_from: ["cat-cafe-requesting-review"]

  # ── 接收 Review ──
  receive-review:
    category: "开发流程"
    description: >
      处理 reviewer 反馈：Red→Green 修复 + 技术论证（禁止表演性同意）。
      Use when: 收到 review 结果、reviewer 提了 P1/P2、需要处理反馈。
      Not for: 发 review 请求（用 request-review）、自检（用 quality-gate）。
      Output: 逐项修复确认 + reviewer 放行。
    triggers:
      - "review 结果"
      - "review 意见"
      - "reviewer 说"
      - "fix these"
    not_for:
      - "发 review 请求"
      - "自检"
    output: "Per-item fix confirmation + reviewer sign-off"
    next: ["merge-gate"]
    sop_step: 3
    merged_from: ["cat-cafe-receiving-review"]

  # ── 合入门禁 ──
  merge-gate:
    category: "开发流程"
    description: >
      合入 main 的完整流程：门禁检查 → PR → remote review → squash merge → 清理。
      Use when: reviewer 放行后准备合入、开 PR、触发remote review、准备 merge。
      Not for: 开发中、review 未通过、自检未完成。
      Output: PR merged + worktree cleaned。
    triggers:
      - "合入 main"
      - "merge"
      - "准备合入"
      - "开 PR"
      - "cloud review"
      - "gh pr create"
    not_for:
      - "开发中"
      - "review 未通过"
    output: "PR merged (squash) + worktree cleaned"
    next: ["feat-lifecycle"]
    sop_step: [4, 5, 6]
    merged_from: ["merge-approval-gate", "requesting-cloud-review", "finishing-a-development-branch"]

  # ── Thread 整理 ──
  organize-threads:
    category: "工具"
    description: >
      猫猫辅助整理未分类 thread，分析标题和元数据，建议合适的标签。
      Use when: 用户说"帮我整理"、"分类 thread"、点击整理按钮。
      Not for: 创建/删除/编辑标签本身。
      Output: 按 thread 的标签建议列表。
    triggers:
      - "帮我整理"
      - "整理 thread"
      - "organize threads"
      - "分类建议"
    not_for:
      - "创建标签"
      - "删除标签"
    output: "Thread label suggestion list"
    next: []
    sop_step: null

  # ── 开源项目拆解 ──
  open-source-teardown:
    category: "调研与知识"
    description: >
      明星开源项目拆解：从宣传/PPT/README 进入源码，验证真实架构、明星特性、算法含量、营销水分、可学习点和不 follow 的 tradeoff。
      Use when: operator要求拆解热门 GitHub 项目、竞品 agent/runtime、外部 skill/tool 框架，或问“它到底有什么真本事/我们能学什么”。
      Not for: 普通资料搜索（用 deep-research）、社区 issue/PR 运营（用 opensource-ops）、只需要架构头脑风暴（用 collaborative-thinking）。
      Output: feature-discussions/YYYY-MM-DD-{project}-deep-dive/ 下的代码证据报告 + 对比结论 + 候选 lesson/skill。
      GOTCHA: 不许只看 README 下判断；每个明星特性必须追到代码路径、状态突变点、反馈闭环和算法输入输出。
    triggers:
      - "拆解明星开源项目"
      - "拆解开源项目"
      - "竞品拆解"
      - "热门 GitHub 项目"
      - "它有什么真本事"
      - "我们能学什么"
      - "marketing vs reality"
      - "算法含量"
      - "拆解 hermes"
      - "看看 letta 怎么做的"
      - "codex cli 源码"
      - "agent runtime 拆解"
    not_for:
      - "普通资料搜索"
      - "社区 issue/PR 运营"
      - "只需要架构头脑风暴"
    output: "Code-evidence teardown report + Clowder AI comparison + candidate lessons"
    next: ["collaborative-thinking", "writing-skills", "deep-research"]
    sop_step: null
    merged_from: null

  # ── 自我进化 ──
  self-evolution:
    category: "治理"
    description: >
      Scope Guard + Process Evolution + Knowledge Evolution — 主动护栏与自我进化。
      Use when: operator scope 发散偏离愿景、同类错误反复出现、SOP 流程缺口、有价值的知识/方法论值得沉淀。
      Not for: 日常 SOP 推进（正常执行）、一次性个案 bug fix。
      Output: Scope 收束提醒 / 流程改进提案 / 知识沉淀提案。
    triggers:
      - "scope 发散"
      - "又犯了"
      - "反复犯错"
      - "流程缺口"
      - "我们应该改"
      - "self-evolution"
      - "这个错误犯了好多次"
      - "要不要拆成多个 feat"
      - "这个值得记住"
      - "沉淀一下"
      - "这个方法论不错"
      - "episode card"
      - "method card"
      - "知识沉淀"
      - "蒸馏"
      - "eval ledger"
      - "成熟度"
    not_for:
      - "日常 SOP 推进"
      - "一次性 bug fix"
    output: "Scope Guard Log / Evolution Proposal / Episode Card → Method/Skill → Eval"
    next: []
    sop_step: null
    merged_from: null

  # ── 绝境反转 ──
  vision-rescue:
    category: "治理"
    description: >
      绝境反转方法论：当任务似乎没有希望、反复摆动、准备放弃愿景时的五步突破框架。
      Use when: 任务看起来无解、多次尝试失败后想放弃、输出投降修辞（"现状最优"/"没救了"/"接受现实"）、连续 3+ 轮在希望与绝望间摆动。
      Not for: 正常 debugging（用 debugging）、常规探索/调研（用 deep-research）、operator 已签字降级的目标、trivial 任务。
      Output: Desperation Packet（六问证据评估）+ 新方向行动计划 / operator 升级请求。
    triggers:
      - "没希望"
      - "没救了"
      - "无解"
      - "死胡同"
      - "不可能"
      - "接受现实"
      - "放弃"
      - "走投无路"
      - "都试过了"
      - "现状最优"
      - "不值得继续"
      - "保守路径"
      - "实际价值变了"
      - "收口"
      - "vision rescue"
    not_for:
      - "未出现绝境信号的常规 debugging"
      - "常规调研"
      - "operator 已签字降级"
      - "trivial 任务"
    output: "Desperation Packet / 新方向行动计划 / operator 升级请求"
    next: ["deep-research", "collaborative-thinking", "self-evolution"]
    sop_step: null
    merged_from: null

  # ── 跨猫交接 ──
  cross-cat-handoff:
    category: "引导与协作"
    description: >
      跨猫传话/交接的五件套结构（What/Why/Tradeoff/Open/Next）。
      Use when: 交接工作给其他猫、传话、写 review 信。
      Not for: 自己的任务、不涉及其他猫的工作。
      Output: 结构化交接信。
    triggers:
      - "交接"
      - "传话"
      - "handoff"
    not_for:
      - "自己的任务"
      - "不涉及其他猫"
    output: "5-part handoff message"
    next: []
    sop_step: null
    merged_from: null

  context-self-management:
    description: >
      F225 软层：收到 context_management_hint(warn) 时判断 handoff / 续 / 冲刺（context 自管理三轴）。
      Use when: 收到 context_management_hint(warn) 系统信号；或自觉话题漂移大想换干净桌子。
      Not for: 没收到 warn 时主动焦虑 context%（内省不准）；把活交给别的猫（用 cross-cat-handoff）。
      Output: handoff（封印自己 spawn 干净自己）/ 续 / 冲刺 判断 + 必要时 propose_session_handoff。
    triggers:
      - "context_management_hint"
      - "context 自管理"
      - "要不要 handoff"
      - "我脏了"
      - "话题漂移"
    not_for:
      - "没收到 warn 时主动焦虑 context%"
      - "把活交给别的猫（用 cross-cat-handoff）"
    output: "handoff / 续 / 冲刺 decision"
    next: []
    sop_step: null
    merged_from: null

  # ── 跨 Thread 协同 ──
  cross-thread-sync:
    category: "引导与协作"
    description: >
      跨 thread 协同：发现平行 session → 通知（3+2 件套）→ 争用协调 → 确认。
      Use when: 平行 session 之间需要协同、收到跨线程消息、通知改动影响、共享文件争用。
      Not for: 跨猫工作交接（用 cross-cat-handoff）。
      GOTCHA: 收到跨线程 ACTION 不等于接活；先做 thread/feat ownership gate，不属于当前 thread 就 cross-post 退回。
      Output: cross-post 通知 + 争用协调完成。
    triggers:
      - "通知另一个 session"
      - "跨 thread"
      - "跨线程消息"
      - "平行世界"
      - "parallel session sync"
      - "另一只Ragdoll"
