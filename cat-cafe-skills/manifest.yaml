      - "operator 同意"
      - "等 X"
      - "PR 在"
    not_for:
      - "纯阅读 cross_post"
      - "本 thread 日常 @mention"
      - "implementation continuation"
    output: "Claim grounding verdict + 接球决策"
    next: ["worktree", "tdd", "merge-gate"]
    sop_step: null
    feature: "F167"

