# ─── 三条铁律（仅此三条） ──────────────────────────────
iron_laws:
  - id: redis-sanctuary
    rule: "Redis 6399 是operator数据圣域，Worktree 开发只用 6398"
  - id: no-self-review
    rule: "同一个体不能 review 自己的代码（跨 family 优先，可降级到同 family 不同个体）"
  - id: no-impersonation
    rule: "不能冒充其他猫，身份是硬约束常量"

# ─── lint 规则 ──────────────────────────────────────────
lint:
  rules:
    - id: has-triggers
      check: "每个 skill 必须有 triggers 和 not_for"
    - id: has-output
      check: "每个 skill 必须有 output 契约"
    - id: next-exists
      check: "next 指向的 skill 必须在 manifest 中存在"
    - id: no-hardcoded-cats
      check: "skill 内容禁止硬编码猫名句柄（用角色/roster 引用）"
    - id: sop-consistent
      check: "sop_step 引用与 SOP.md 一致"
    - id: no-overmerge
      check: "合并后的 description 不能变成'什么都能做'"
